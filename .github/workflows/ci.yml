name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Worker types
        run: bun run cf-typegen

      - name: Type check
        run: bun run typecheck

      - name: Run Worker tests
        run: bun run test

      - name: Check generated Worker types
        run: bun run cf-typegen:check

      - name: Verify Wrangler dry-run build
        run: bunx wrangler deploy --dry-run
