name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README*'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: Deploy the Worker to production
        required: false
        default: false
        type: boolean
      publish_oci:
        description: Publish the OCI image to GHCR
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/validate-reusable.yml

  release-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    outputs:
      has-cloudflare-secrets: ${{ steps.cloudflare.outputs.present }}

    steps:
      - name: Check Cloudflare credentials availability
        id: cloudflare
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [[ -n "$CLOUDFLARE_API_TOKEN" && -n "$CLOUDFLARE_ACCOUNT_ID" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-worker:
    needs:
      - validate
      - release-gates
    if: >
      needs.validate.result == 'success' &&
      needs.release-gates.outputs.has-cloudflare-secrets == 'true' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_worker && github.ref == 'refs/heads/main')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Worker types
        run: bun run cf-typegen

      - name: Deploy Worker
        run: bun run deploy

  publish-oci:
    needs:
      - validate
    if: >
      needs.validate.result == 'success' &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.publish_oci &&
          github.ref == 'refs/heads/main'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/xixu-me/paseo-relay

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish OCI image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.IMAGE_NAME }}:main
